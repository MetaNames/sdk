name: Main workflow

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  eslint:
    permissions:
      contents: read
      security-events: write
      actions: read
    uses: ./.github/workflows/eslint.yml

  tsc:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install project dependencies
        run: npm ci

      - name: Run TypeScript compiler
        run: npm run build

  test:
    needs: eslint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install project dependencies
        run: npm ci

      - name: Run tests with coverage
        run: npm test --coverage
        env:
          TEST_PRIVATE_KEY: ${{ secrets.TEST_PRIVATE_KEY }}

  docs:
    needs: test
    uses: ./.github/workflows/docs.yml
